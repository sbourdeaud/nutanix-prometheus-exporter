[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "ntnx_vmm_py_client.*",
    "ntnx_clustermgmt_py_client.*",
    "ntnx_networking_py_client.*",
    "ntnx_prism_py_client.*",
    "ntnx_files_py_client.*",
    "ntnx_objects_py_client.*",
    "ntnx_volumes_py_client.*",
    "ntnx_datapolicies_py_client.*",
    "ntnx_dataprotection_py_client.*",
    "ntnx_microseg_py_client.*",
    "ntnx_monitoring_py_client.*",
]
ignore_missing_imports = true

[tool.pylint.messages_control]
disable = ["C0103", "C0111", "R0903", "R0913"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

